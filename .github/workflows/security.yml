name: Security and drift checks

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 18 * * 0" # Weekly run (UTC); adjust if you like

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (for CodeQL)
        run: pnpm -r build
        continue-on-error: true

      - name: Run Prisma schema validation
        run: pnpm --filter @apgms/shared exec prisma validate --schema prisma/schema.prisma
        env:
          # Dummy but syntactically valid URL so Prisma can read env("DATABASE_URL")
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
