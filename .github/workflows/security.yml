name: Security

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: apgms_ci
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # Used by Prisma CLI (matches the Postgres service above)
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/apgms_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.x"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres; then
              echo "Postgres is up!";
              break
            fi
            echo "Waiting for Postgres..."
            sleep 3
          done

      # --- Prisma schema / drift checks ---

      - name: Prisma schema validate (@apgms/shared)
        run: pnpm --filter @apgms/shared exec prisma validate --schema prisma/schema.prisma

      - name: Prisma migrate status (@apgms/shared)
        run: pnpm --filter @apgms/shared exec prisma migrate status --schema prisma/schema.prisma

      # --- Add whatever security tools you want below ---
      # - name: Run npm audit (all workspaces)
      #   run: pnpm audit --recursive
      #
      # - name: Run ESLint security rules only
      #   run: pnpm lint:security
