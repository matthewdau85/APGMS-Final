name: Security

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest

    env:
      # Dummy URL so Prisma CLI can read env("DATABASE_URL").
      # Does not need to be a real running DB for validate/status.
      DATABASE_URL: postgresql://apgms-ci:apgms-ci@127.0.0.1:5432/apgms_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.x"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Prisma schema / drift checks ---

      - name: Prisma schema validate (@apgms/shared)
        env:
          # Value doesn't matter as long as it's present; validate only needs the env var, not a live DB.
          DATABASE_URL: postgresql://apgms_ci:apgms_ci@127.0.0.1:5432/apgms_ci?schema=public
        run: pnpm --filter @apgms/shared exec prisma validate --schema prisma/schema.prisma

      - name: Prisma migrate status (@apgms/shared)
        run: pnpm --filter @apgms/shared exec prisma migrate status --schema prisma/schema.prisma

      # --- Add whatever security tools you want below ---
      # Examples:
      # - name: Run npm audit (all workspaces)
      #   run: pnpm audit --recursive
      #
      # - name: Run ESLint security rules only
      #   run: pnpm lint:security
